basePath: /v1/cs-agent-bot
definitions:
  apperror.FieldError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
  dto.CheckinFormRequest:
    properties:
      company_id:
        example: KTK-001
        type: string
    required:
    - company_id
    type: object
  dto.HandoffCreateRequest:
    properties:
      activation_date:
        example: "2024-01-15"
        type: string
      company_id:
        example: KTK-001
        type: string
      company_name:
        example: PT Maju Bersama Sejahtera
        type: string
      contract_end:
        example: "2026-01-15"
        type: string
      contract_months:
        example: 12
        type: integer
      contract_start:
        example: "2024-01-15"
        type: string
      owner_name:
        example: Rina
        type: string
      owner_telegram_id:
        example: "-1001234567890"
        type: string
      owner_wa:
        example: "6289876543210"
        type: string
      pic_name:
        example: Budi Santoso
        type: string
      pic_wa:
        example: "6281234567890"
        type: string
      segment:
        example: Mid
        type: string
    required:
    - company_id
    - company_name
    - contract_end
    - contract_months
    - contract_start
    - owner_name
    - owner_telegram_id
    - pic_name
    - pic_wa
    - segment
    type: object
  dto.WAWebhookRequest:
    properties:
      message_id:
        example: msg_1234567890
        type: string
      message_type:
        description: text, image, voice, video, document
        example: text
        type: string
      phone_number:
        example: "6281234567890"
        type: string
      text:
        example: Thank you for the reminder.
        type: string
      timestamp:
        example: "2025-03-26T10:30:00Z"
        type: string
    type: object
  internal_delivery_http_payment.VerifyPaymentRequest:
    properties:
      company_id:
        type: string
      invoice_id:
        type: string
      notes:
        type: string
      verified_by:
        type: string
    type: object
  response.StandardResponse:
    properties:
      data: {}
      errorCode:
        type: string
      message:
        type: string
      requestId:
        type: string
      stackTrace:
        type: string
      status:
        description: '"success" or "error"'
        type: string
      traceId:
        type: string
      validationErrors:
        items:
          $ref: '#/definitions/apperror.FieldError'
        type: array
    type: object
host: api-dev.sejutacita.id
info:
  contact:
    name: Dealls Engineering
    url: https://github.com/Sejutacita
  description: WhatsApp automation bot for Kantorku.id HRIS SaaS
  title: Customer Service Agent Bot API
  version: "1.0"
paths:
  /api/handoff/new-client:
    post:
      description: Creates a new client record when a Business Development team member
        hands off a new prospect. Requires HMAC authentication using X-Handoff-Secret
        header.
      parameters:
      - description: New client handoff payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.HandoffCreateRequest'
      responses:
        "201":
          description: Client onboarded successfully
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "401":
          description: Unauthorized - invalid HMAC signature
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - X-Handoff-Secret: []
      summary: Onboard New Client from BD Handoff
      tags:
      - api
  /api/payment/verify:
    post:
      description: Verifies and marks a client's payment as paid after AE verification.
        Sends confirmation to client via WhatsApp and creates tracking record. Requires
        HMAC authentication using X-Verify-Secret header.
      parameters:
      - description: Payment verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_delivery_http_payment.VerifyPaymentRequest'
      responses:
        "200":
          description: Payment verified successfully
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "401":
          description: Unauthorized - invalid HMAC signature
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - X-Verify-Secret: []
      summary: Verify Client Payment
      tags:
      - api
  /cron/run:
    get:
      description: Manually triggers the bot's cron job to process all clients and
        send scheduled WhatsApp messages. Requires GCP Cloud Scheduler OIDC token
        authentication.
      responses:
        "200":
          description: Cron run completed successfully
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "401":
          description: Unauthorized - invalid or missing OIDC token
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error - cron run failed
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - BearerAuth: []
      summary: Trigger Cron Job
      tags:
      - cron
  /readiness:
    get:
      description: Health check for service
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Health Check
      tags:
      - health
  /webhook/checkin-form:
    post:
      description: Processes check-in form submissions from clients. Marks the client
        as having replied to check-in and notifies the Account Executive via Telegram.
      parameters:
      - description: Check-in form payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CheckinFormRequest'
      responses:
        "200":
          description: Checkin form processed successfully
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "404":
          description: Company not found
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Process Check-in Form Submission
      tags:
      - webhook
  /webhook/wa:
    post:
      description: Receives incoming WhatsApp message events from HaloAI. Returns
        HTTP 200 immediately, then processes the message asynchronously in a background
        goroutine.
      parameters:
      - description: WhatsApp webhook payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.WAWebhookRequest'
      responses:
        "200":
          description: Webhook received (async processing)
          schema:
            type: string
        "400":
          description: Invalid request body
          schema:
            type: string
      summary: Receive WhatsApp Webhook
      tags:
      - webhook
swagger: "2.0"
