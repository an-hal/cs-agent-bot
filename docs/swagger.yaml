host: api-dev.sejutacita.id
info:
  contact:
    name: Dealls Engineering
    url: https://github.com/Sejutacita
  description: WhatsApp automation bot for Kantorku.id HRIS SaaS
  title: Customer Service Agent Bot API
  version: "1.0"
paths:
  /api/clients:
    post:
      description: Creates a new client in the workspace specified in the X-Workspace-ID
        header.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Client payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dashboard.CreateClientRequest'
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.Client'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Create client
      tags:
      - Dashboard
  /api/clients/{company_id}:
    delete:
      description: Soft-deletes a client by company_id (sets blacklisted=true).
      parameters:
      - description: Company ID
        in: path
        name: company_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Delete client
      tags:
      - Dashboard
    get:
      description: Returns a single client by company_id.
      parameters:
      - description: Company ID
        in: path
        name: company_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.Client'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Get client by ID
      tags:
      - Dashboard
    put:
      description: Partially updates a client by company_id.
      parameters:
      - description: Company ID
        in: path
        name: company_id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Update client
      tags:
      - Dashboard
  /api/data-master/activity-logs:
    get:
      description: Returns paginated activity log entries across all categories (bot,
        data, team).
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: 'Category filter: bot | data | team (default: all)'
        in: query
        name: category
        type: string
      - description: 'Resource type filter: client | invoice | template | trigger_rule
          | bot | team'
        in: query
        name: resource_type
        type: string
      - description: Filter by record ID (company_id, template_id, rule_id, invoice_id)
        in: query
        name: ref_id
        type: string
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Max entries to return (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: ISO 8601 timestamp — return entries after this time
        in: query
        name: since
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponseWithMeta'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.ActivityLog'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: List activity logs
      tags:
      - Dashboard
    post:
      description: Records a data or team activity pushed by the dashboard.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Activity payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dashboard.recordActivityRequest'
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ActivityLog'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Record an activity
      tags:
      - Dashboard
  /api/data-master/clients:
    get:
      description: Returns paginated clients for the workspace specified in the X-Workspace-ID
        header.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Search across company_id, company_name, etc.
        in: query
        name: search
        type: string
      - description: Filter by segment
        in: query
        name: segment
        type: string
      - description: Filter by payment status
        in: query
        name: payment_status
        type: string
      - description: Filter by CS sequence
        in: query
        name: sequence_cs
        type: string
      - description: Filter by plan type
        in: query
        name: plan_type
        type: string
      - description: Filter by bot active status
        in: query
        name: bot_active
        type: boolean
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Limit per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponseWithMeta'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.Client'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: List clients
      tags:
      - Dashboard
  /api/data-master/clients/export:
    post:
      description: Starts a background export job for the workspace. Poll /jobs/{job_id}
        for status, then download via /jobs/{job_id}/download.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Search term
        in: query
        name: search
        type: string
      - description: Segment filter
        in: query
        name: segment
        type: string
      - description: Payment status filter
        in: query
        name: payment_status
        type: string
      - description: Sequence CS filter
        in: query
        name: sequence_cs
        type: string
      - description: Plan type filter
        in: query
        name: plan_type
        type: string
      responses:
        "202":
          description: Accepted
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.BackgroundJob'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Export clients to XLSX
      tags:
      - Background Jobs
  /api/data-master/clients/import:
    post:
      description: Accepts a multipart XLSX file (Template Import sheet), creates
        a background import job, and returns immediately with the job ID.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: XLSX file (max 5 MB)
        in: formData
        name: file
        required: true
        type: file
      - description: Update existing clients (default false)
        in: query
        name: update_existing
        type: boolean
      responses:
        "202":
          description: Accepted
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.BackgroundJob'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Import clients from XLSX
      tags:
      - Background Jobs
  /api/data-master/escalations:
    get:
      description: Returns paginated escalations for the workspace specified in the
        X-Workspace-ID header.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Filter by company ID
        in: query
        name: company_id
        type: string
      - description: Filter by status (Open/Resolved)
        in: query
        name: status
        type: string
      - description: Filter by priority
        in: query
        name: priority
        type: string
      - description: Search across company_id, reason, esc_id, notes
        in: query
        name: search
        type: string
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Limit per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponseWithMeta'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.Escalation'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: List escalations
      tags:
      - Dashboard
  /api/data-master/invoices:
    get:
      description: Returns paginated invoices for the workspace specified in the X-Workspace-ID
        header.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Filter by company ID
        in: query
        name: company_id
        type: string
      - description: Filter by payment status
        in: query
        name: status
        type: string
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Limit per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponseWithMeta'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.Invoice'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: List invoices
      tags:
      - Dashboard
  /api/data-master/jobs:
    get:
      description: Returns paginated background jobs for the workspace, optionally
        filtered by job_type and entity_type.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: 'Filter by job type: import|export'
        in: query
        name: job_type
        type: string
      - description: 'Filter by entity type: client'
        in: query
        name: entity_type
        type: string
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponseWithMeta'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.BackgroundJob'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: List background jobs
      tags:
      - Background Jobs
  /api/data-master/jobs/{job_id}:
    get:
      description: Returns the current status and progress of any background job (import
        or export).
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.BackgroundJob'
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Get background job status
      tags:
      - Background Jobs
  /api/data-master/jobs/{job_id}/download:
    get:
      description: Streams the XLSX file for a completed export job. Returns 409 if
        the job is not yet done.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Download export file
      tags:
      - Background Jobs
  /api/data-master/system-config:
    get:
      description: Returns all system_config entries. Sensitive values (tokens) are
        masked.
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.SystemConfig'
                  type: array
              type: object
      summary: List all system config entries
      tags:
      - Dashboard
  /api/data-master/system-config/{key}:
    put:
      description: Updates the value of a single system_config key.
      parameters:
      - description: Config key (e.g. HALOAI_API_URL)
        in: path
        name: key
        required: true
        type: string
      - description: '{ \'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Update a system config entry
      tags:
      - Dashboard
  /api/data-master/template-variables:
    get:
      parameters:
      - description: Filter by channel (wa, email)
        in: query
        name: channel
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/template.VariableInfo'
                  type: array
              type: object
      summary: List available template variables
      tags:
      - Dashboard
  /api/data-master/trigger-rules:
    get:
      parameters:
      - description: Filter by rule group
        in: query
        name: rule_group
        type: string
      - description: Filter by action type
        in: query
        name: action_type
        type: string
      - description: Filter by active status
        in: query
        name: active
        type: string
      - description: Search by rule_id, group, description
        in: query
        name: search
        type: string
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Limit per page
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponseWithMeta'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.TriggerRule'
                  type: array
              type: object
      summary: List trigger rules
      tags:
      - Dashboard
    post:
      parameters:
      - description: Trigger rule
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/entity.TriggerRule'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Create trigger rule
      tags:
      - Dashboard
  /api/data-master/trigger-rules/{rule_id}:
    delete:
      parameters:
      - description: Rule ID
        in: path
        name: rule_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Delete trigger rule (soft delete)
