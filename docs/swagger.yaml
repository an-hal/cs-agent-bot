  /auth/google:
    post:
      consumes:
      - application/json
      description: Authenticates a user with a Google ID token (credential from Google
        Sign-In). Sets an httpOnly session cookie on success. Rate-limited to 10 req/min
        per IP.
      parameters:
      - description: Google credential token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Google login successful
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.GoogleLoginResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "401":
          description: Invalid or expired Google token
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "403":
          description: Email not in whitelist
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Google OAuth login
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password via ms-auth-proxy.
        On success, sets an httpOnly session cookie and returns an access token. Rate-limited
        to 5 req/min per IP and 3 req/min per email.
      parameters:
      - description: Login credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.LoginResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "403":
          description: Email not in whitelist
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Email/password login
      tags:
      - auth
