        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Max items (default 50, max 200)
        in: query
        name: limit
        type: integer
      responses: {}
      summary: Unified activity feed (action_log + mutations + activity_log)
      tags:
      - ActivityLogs
  /api/activity-log/today:
    get:
      description: Convenience wrapper over /activity-log/feed scoped to today's UTC.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      responses: {}
      summary: Today's unified activity (action + mutations + activity_log)
      tags:
      - ActivityLogs
  /api/approvals:
    get:
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: pending | approved | rejected | expired
        in: query
        name: status
        type: string
      - description: Filter by approval type
        in: query
        name: request_type
        type: string
      - description: Filter by maker
        in: query
        name: maker_email
        type: string
      - description: Default 50, max 200
        in: query
        name: limit
        type: integer
      - description: Default 0
        in: query
        name: offset
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - BearerAuth: []
      summary: List approval requests for the current workspace
      tags:
      - Approvals
  /api/approvals/{id}:
    get:
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Approval request UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ApprovalRequest'
              type: object
      security:
      - BearerAuth: []
      summary: Get a single approval request
      tags:
      - Approvals
  /api/approvals/{id}/apply:
    post:
      description: |-
        Routes by request_type: create_invoice, mark_invoice_paid,
        collection_schema_change, delete_client_record,
        toggle_automation_rule, bulk_import_master_data,
        stage_transition, integration_key_change.
        For bulk_import the xlsx is rehydrated from the approval
        payload (file_b64) — no second upload needed.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Approval request ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ApprovalRequest'
              type: object
      security:
      - BearerAuth: []
      summary: Apply a pending approval (central dispatcher)
      tags:
      - Approvals
  /api/approvals/{id}/reject:
    post:
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Approval request UUID
        in: path
        name: id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dashboard.ApprovalRejectRequest'
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.ApprovalRequest'
              type: object
      security:
      - BearerAuth: []
      summary: Reject a pending approval (sets status=rejected)
      tags:
      - Approvals
