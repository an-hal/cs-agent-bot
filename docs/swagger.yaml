host: api-dev.sejutacita.id
info:
  contact:
    name: Dealls Engineering
    url: https://github.com/Sejutacita
  description: WhatsApp automation bot for Kantorku.id HRIS SaaS
  title: Customer Service Agent Bot API
  version: "1.0"
paths:
  /analytics/distributions:
    get:
      description: Distribution data for charts (donut, horizontal bars).
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.DistributionData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Distribution data for charts
      tags:
      - Analytics
  /analytics/engagement:
    get:
      description: Bot/NPS/checkin/cross-sell/renewed counts.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.EngagementData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Engagement metrics
      tags:
      - Analytics
  /analytics/forecast-accuracy:
    get:
      description: Last month's forecast vs actual difference.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Forecast accuracy
      tags:
      - Analytics
  /analytics/kpi:
    get:
      description: Comprehensive KPI data for the Analytics page.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.KPIData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Full KPI data
      tags:
      - Analytics
  /analytics/kpi/bundle:
    get:
      description: |-
        Single-call batch for FE dashboard; optional role filter tags the payload so FE
        can render role-specific panels without a second round-trip. Cache is recommended
        at the client side (15 min).
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: sdr|bd|ae|admin — optional, echoed in meta
        in: query
        name: role
        type: string
      - description: Revenue-trend history window (default 6)
        in: query
        name: months
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Bundled KPI + distributions + engagement + forecast
      tags:
      - Analytics
  /analytics/revenue-trend:
    get:
      description: Monthly revenue data with OLS linear regression forecast.
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Total months (default 16 — 10 actual + 6 forecast)
        in: query
        name: months
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.RevenueTrendResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Monthly revenue data with forecast
      tags:
      - Analytics
  /api/action-log/recent:
    get:
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Max items (default 50, max 200)
        in: query
        name: limit
        type: integer
      responses: {}
      summary: Last N bot actions for the current workspace
      tags:
      - ActionLogs
  /api/action-log/summary:
    get:
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Lookback hours (default 24)
        in: query
        name: hours
        type: integer
      responses: {}
      summary: Aggregated bot action counts (total, messages_sent, replies, escalations)
      tags:
      - ActionLogs
  /api/action-log/today:
    get:
      parameters:
      - description: Workspace ID
        in: header
        name: X-Workspace-ID
        required: true
        type: string
      - description: Max items (default 200)
        in: query
        name: limit
        type: integer
      responses: {}
      summary: Bot actions from the current UTC day
      tags:
      - ActionLogs
  /api/activity-log/feed:
    get:
      parameters:
