  /whitelist:
    get:
      description: Returns all whitelisted email entries. Admin only — requires a
        valid session cookie (JWT middleware). Must NOT be cached or exposed publicly
        to prevent email enumeration.
      produces:
      - application/json
      responses:
        "200":
          description: Whitelist retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/auth.WhitelistEntry'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - CookieAuth: []
      summary: List whitelist entries
      tags:
      - whitelist
    post:
      consumes:
      - application/json
      description: Adds an email to the access whitelist. Admin only — requires a
        valid session cookie. Returns 409 if the email is already present.
      parameters:
      - description: Email to whitelist
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.AddWhitelistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Whitelist entry created
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.WhitelistEntry'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "409":
          description: Email already in whitelist
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - CookieAuth: []
      summary: Add email to whitelist
      tags:
      - whitelist
  /whitelist/{id}:
    delete:
      description: Removes a whitelist entry by ID. Admin only — requires a valid
        session cookie.
      parameters:
      - description: Whitelist entry ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Entry removed
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.DeleteWhitelistResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "404":
          description: Whitelist entry not found
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      security:
      - CookieAuth: []
      summary: Remove email from whitelist
      tags:
      - whitelist
  /whitelist/check:
    get:
      description: 'Public probe that returns only {allowed: bool} for a given email.
        Response shape is constant regardless of whether the email exists, preventing
        account enumeration via timing or error differences.'
      parameters:
      - description: Email address to check
        in: query
        name: email
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Check result
          schema:
            allOf:
            - $ref: '#/definitions/response.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.WhitelistCheckResponse'
              type: object
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/response.StandardResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.StandardResponse'
      summary: Check whitelist status
      tags:
      - whitelist
securityDefinitions:
  CookieAuth:
    description: Session cookie set by POST /auth/login or POST /auth/google. Required
      for admin-only endpoints.
    in: cookie
    name: auth_session
    type: apiKey
swagger: "2.0"
